version: '3.8'

services:
  db:
    image: postgres:15
    container_name: ecommerce_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: analytics_db
    ports:
      - "5433:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    restart: always

  generator:
    build: .
    container_name: ecommerce_generator
    depends_on:
      - db
    environment:
      DB_HOST: db
    restart: "no" # Runs once to generate seed data or set to 'always' for continuous flow

volumes:
  postgres_data:
